<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>kelimece — Türkçe Wordle</title>
<link rel="stylesheet" href="../ortak/stil.css">
<style>
.oyun{max-width:380px;margin:0 auto;text-align:center}
.tahta{display:grid;grid-template-rows:repeat(6,1fr);gap:6px;margin:18px auto}
.satir{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.kutu{width:58px;height:58px;border:2px solid var(--line);border-radius:8px;display:flex;align-items:center;justify-content:center;
  font-size:26px;text-transform:uppercase;background:var(--card);transition:transform .1s}
.kutu.dolu{border-color:var(--muted);transform:scale(1.04)}
.kutu.yesil{background:#4e8d6e;border-color:#4e8d6e;color:#fff}
.kutu.sari{background:#c9a24b;border-color:#c9a24b;color:#fff}
.kutu.gri{background:#9aa0a6;border-color:#9aa0a6;color:#fff}
.klavye{margin-top:16px;user-select:none}
.ksira{display:flex;justify-content:center;gap:5px;margin-bottom:6px}
.tus{min-width:30px;padding:11px 8px;border:none;border-radius:6px;background:var(--card);border:1px solid var(--line);
  font-size:14px;text-transform:uppercase}
.tus.genis{min-width:56px;font-size:12px}
.tus.yesil{background:#4e8d6e;color:#fff;border-color:#4e8d6e}
.tus.sari{background:#c9a24b;color:#fff;border-color:#c9a24b}
.tus.gri{background:#9aa0a6;color:#fff;border-color:#9aa0a6}
.mesaj{min-height:24px;color:var(--vurgu);font-style:italic;margin-top:10px}
.modlar{display:flex;gap:8px;justify-content:center;margin-top:6px}
.modlar button{font-size:13px;padding:5px 14px;border:1px solid var(--line);border-radius:16px;background:var(--card)}
.modlar button.secili{border-color:var(--acc);color:var(--acc);background:var(--acc-soft)}
.istat{font-size:13px;color:var(--muted);margin-top:10px}
@media(max-width:430px){.kutu{width:52px;height:52px;font-size:23px}}
</style>
</head>
<body>
<div class="wrap">
<header class="site">
  <a href="../"><h1>veranda <b>araçları</b></h1></a>
  <nav class="araclar">
    <a href="../sozluk/">dilimin ucunda</a>
    <a href="./" class="burada">kelimece</a>
    <a href="../bulmaca/">bulmaca yardımcısı</a>
  </nav>
</header>
<main class="oyun">
  <h2 style="font-weight:normal;font-size:24px">kelimece</h2>
  <div class="modlar">
    <button id="modGun" class="secili" onclick="modSec('gun')">günün kelimesi</button>
    <button id="modSerbest" onclick="modSec('serbest')">serbest oyun</button>
  </div>
  <div class="tahta" id="tahta"></div>
  <div class="mesaj" id="mesaj"></div>
  <div class="klavye" id="klavye"></div>
  <div class="istat" id="istat"></div>
</main>
<footer>her gün yeni kelime · Türkçe beş harf</footer>
</div>
<script src="../ortak/wordle-listeler.js"></script>
<script>
const TRMAP = {"İ":"i","I":"ı","Ş":"ş","Ğ":"ğ","Ü":"ü","Ö":"ö","Ç":"ç"};
const trLower = s => s.replace(/[İIŞĞÜÖÇ]/g,c=>TRMAP[c]).toLowerCase();
const SIRALAR = ["ertyuıopğü","asdfghjklşi","zcvbnmöç"];
let mod = 'gun', cevap = '', satir = 0, sutun = 0, bitti = false;
let tahtaVeri = Array.from({length:6},()=>Array(5).fill(''));

function gunSayisi(){
  const baslangic = new Date(2026, 0, 1);
  return Math.floor((Date.now() - baslangic) / 86400000);
}
function cevapSec(){
  if(mod === 'gun') cevap = CEVAPLAR[gunSayisi() % CEVAPLAR.length];
  else cevap = CEVAPLAR[Math.floor(Math.random() * CEVAPLAR.length)];
}
function modSec(m){
  mod = m; bitti = false; satir = 0; sutun = 0;
  tahtaVeri = Array.from({length:6},()=>Array(5).fill(''));
  document.getElementById('modGun').classList.toggle('secili', m==='gun');
  document.getElementById('modSerbest').classList.toggle('secili', m==='serbest');
  cevapSec(); ciz(); klavyeCiz(); mesaj('');
}
function ciz(sonuc){
  const t = document.getElementById('tahta');
  t.innerHTML = '';
  for(let r=0;r<6;r++){
    const sd = document.createElement('div'); sd.className='satir';
    for(let c=0;c<5;c++){
      const k = document.createElement('div');
      k.className = 'kutu' + (tahtaVeri[r][c] ? ' dolu' : '');
      if(renkler[r] && renkler[r][c]) k.classList.add(renkler[r][c]);
      k.textContent = tahtaVeri[r][c];
      sd.appendChild(k);
    }
    t.appendChild(sd);
  }
}
let renkler = Array.from({length:6},()=>Array(5).fill(''));
const tusRenk = {};
function klavyeCiz(){
  const kl = document.getElementById('klavye');
  kl.innerHTML = '';
  SIRALAR.forEach((sira, i)=>{
    const sd = document.createElement('div'); sd.className='ksira';
    if(i===2){ const b=tusYap('sil','genis'); b.onclick=()=>tusBas('SIL'); sd.appendChild(b); }
    for(const h of sira){
      const b = tusYap(h, tusRenk[h]||'');
      b.onclick = ()=>tusBas(h);
      sd.appendChild(b);
    }
    if(i===2){ const b=tusYap('dene','genis'); b.onclick=()=>tusBas('ENTER'); sd.appendChild(b); }
    kl.appendChild(sd);
  });
}
function tusYap(h, ek){
  const b = document.createElement('button');
  b.className = 'tus' + (ek?' '+ek:'');
  b.textContent = h;
  return b;
}
function mesaj(m){ document.getElementById('mesaj').textContent = m; }
function tusBas(h){
  if(bitti) return;
  if(h === 'SIL'){ if(sutun>0){ sutun--; tahtaVeri[satir][sutun]=''; ciz(); } return; }
  if(h === 'ENTER'){ dene(); return; }
  if(sutun < 5){ tahtaVeri[satir][sutun] = h; sutun++; ciz(); }
}
function dene(){
  if(sutun < 5){ mesaj('beş harf gerek'); return; }
  const tahmin = tahtaVeri[satir].join('');
  if(!GECERLI.has(tahmin)){ mesaj('sözlükte yok: ' + tahmin); return; }
  mesaj('');
  const c = cevap.split(''), kalan = {};
  c.forEach(h=>kalan[h]=(kalan[h]||0)+1);
  const rs = Array(5).fill('gri');
  for(let i=0;i<5;i++) if(tahmin[i]===c[i]){ rs[i]='yesil'; kalan[tahmin[i]]--; }
  for(let i=0;i<5;i++) if(rs[i]!=='yesil' && kalan[tahmin[i]]>0){ rs[i]='sari'; kalan[tahmin[i]]--; }
  renkler[satir] = rs;
  for(let i=0;i<5;i++){
    const h = tahmin[i], oncelik = {gri:0, sari:1, yesil:2};
    if((oncelik[tusRenk[h]]??-1) < oncelik[rs[i]]) tusRenk[h] = rs[i];
  }
  ciz(); klavyeCiz();
  if(tahmin === cevap){
    bitti = true; mesaj(['dahice!','harika!','bravo!','güzel!','oldu!','ucu ucuna!'][satir]);
    istatKaydet(satir+1);
  } else if(++satir === 6){
    bitti = true; mesaj('cevap: ' + cevap);
    istatKaydet(0);
  }
  sutun = 0;
}
function istatKaydet(sonuc){
  if(mod !== 'gun') return;
  try{
    const s = JSON.parse(localStorage.getItem('kelimece')||'{"oyun":0,"galibiyet":0}');
    s.oyun++; if(sonuc) s.galibiyet++;
    localStorage.setItem('kelimece', JSON.stringify(s));
    istatGoster();
  }catch(e){}
}
function istatGoster(){
  try{
    const s = JSON.parse(localStorage.getItem('kelimece')||'{"oyun":0,"galibiyet":0}');
    if(s.oyun) document.getElementById('istat').textContent =
      `${s.oyun} oyun · ${Math.round(100*s.galibiyet/s.oyun)}% galibiyet`;
  }catch(e){}
}
document.addEventListener('keydown', e=>{
  if(e.key === 'Enter') tusBas('ENTER');
  else if(e.key === 'Backspace') tusBas('SIL');
  else { const h = trLower(e.key); if(/^[abcçdefgğhıijklmnoöprsştuüvyz]$/.test(h)) tusBas(h); }
});
renkler = Array.from({length:6},()=>Array(5).fill(''));
cevapSec(); ciz(); klavyeCiz(); istatGoster();
</script>
</body>
</html>
